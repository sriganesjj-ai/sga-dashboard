<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGA Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a12;
  --panel:rgba(14,22,40,0.6);
  --border:rgba(255,255,255,0.08);
  --text:#f0f4ff;
  --muted:#8899bb;
  --emerald:#10d984;
  --emerald-dim:rgba(16,217,132,0.1);
  --emerald-border:rgba(16,217,132,0.25);
  --blue:#3b82f6;
  --red:#f87171;
  --yellow:#fbbf24;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.25;z-index:0;pointer-events:none;animation:floatOrb 20s ease-in-out infinite alternate;}
.orb-1{width:500px;height:500px;background:#10d984;top:-150px;left:-150px;}
.orb-2{width:400px;height:400px;background:#3b82f6;bottom:-100px;right:-100px;animation-delay:-8s;}
@keyframes floatOrb{0%{transform:translate3d(0,0,0)}100%{transform:translate3d(60px,80px,0) scale(1.1)}}

/* GLASS */
.glass{background:var(--panel);border:1px solid var(--border);backdrop-filter:blur(24px);border-radius:16px;box-shadow:0 20px 40px -12px rgba(0,0,0,0.6);}

/* BRAIN RINGS */
.brain{width:64px;height:64px;margin:0 auto 24px;position:relative;transform-style:preserve-3d;animation:rotateBrain 8s linear infinite;}
.br{position:absolute;width:100%;height:100%;border:2px solid rgba(16,217,132,0.6);border-radius:50%;box-shadow:0 0 14px rgba(16,217,132,0.3);}
.br:nth-child(1){transform:rotateX(70deg) rotateY(0deg);}
.br:nth-child(2){transform:rotateX(70deg) rotateY(60deg);border-color:rgba(59,130,246,0.6);}
.br:nth-child(3){transform:rotateX(70deg) rotateY(120deg);border-color:rgba(139,92,246,0.6);}
@keyframes rotateBrain{0%{transform:rotateX(20deg) rotateY(0deg)}100%{transform:rotateX(380deg) rotateY(360deg)}}

.brain-sm{width:32px;height:32px;margin:0;animation-duration:12s;}
.brain-sm .br{border-width:1.5px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px rgba(16,217,132,0.4)}50%{opacity:0.3;box-shadow:none}}

/* ═══ LOGIN ═══ */
#login-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:440px;padding:52px 44px;text-align:center;animation:fadeUp 1s ease both;}
.login-eye{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--emerald);margin-bottom:14px;font-weight:600;}
.login-box h2{font-size:30px;font-weight:800;margin-bottom:8px;}
.login-box h2 span{color:var(--emerald);}
.login-box p{color:var(--muted);margin-bottom:36px;font-size:15px;}
.inp{width:100%;padding:16px 20px;margin-bottom:14px;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all 0.3s;}
.inp:focus{border-color:var(--emerald);box-shadow:0 0 0 3px rgba(16,217,132,0.1);}
.inp::placeholder{color:rgba(136,153,187,0.5);}
.lerr{color:var(--red);font-size:13px;display:none;margin-bottom:12px;background:rgba(248,113,113,0.08);padding:10px;border-radius:8px;border:1px solid rgba(248,113,113,0.15);}
.btn-g{background:linear-gradient(135deg,#10d984,#059669);color:#030a06;border:none;border-radius:12px;padding:16px 28px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 20px -4px rgba(16,217,132,0.35);}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 12px 28px -4px rgba(16,217,132,0.45);}
.btn-g:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-g.full{width:100%;}

/* ═══ APP ═══ */
#app{display:none;position:relative;z-index:1;min-height:100vh;}

/* HEADER */
header{position:sticky;top:0;z-index:50;padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,10,18,0.85);border-bottom:1px solid var(--border);backdrop-filter:blur(30px);}
.hbrand{display:flex;align-items:center;gap:12px;}
.hname{font-size:18px;font-weight:700;}
.hname span{color:var(--emerald);}
.hsub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.hstatus{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--emerald);font-weight:600;}
.hdot{width:6px;height:6px;background:var(--emerald);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
.hright{display:flex;align-items:center;gap:14px;}
.hagent{font-size:14px;font-weight:600;}
.btn-sm{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.3s;font-weight:500;}
.btn-sm:hover{color:var(--text);background:rgba(255,255,255,0.08);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:380px 1fr;gap:0;min-height:calc(100vh - 68px);}

/* LEFT PANEL */
.left-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(8,14,26,0.5);}

/* SEARCH BAR */
.search-bar{padding:20px;border-bottom:1px solid var(--border);}
.search-input-wrap{position:relative;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;}
.search-inp{width:100%;padding:12px 16px 12px 42px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all 0.3s;}
.search-inp:focus{border-color:var(--emerald);background:rgba(0,0,0,0.5);}
.search-inp::placeholder{color:rgba(136,153,187,0.45);}
.search-meta{font-size:12px;color:var(--muted);margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.search-count{color:var(--emerald);font-weight:600;}

/* FILTERS */
.filters{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:6px 14px;border-radius:100px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;transition:all 0.2s;}
.filter-btn:hover,.filter-btn.active{background:var(--emerald-dim);border-color:var(--emerald-border);color:var(--emerald);}

/* COMPANY LIST */
.company-list{flex:1;overflow-y:auto;padding:12px;}
.company-list::-webkit-scrollbar{width:3px;}
.company-list::-webkit-scrollbar-thumb{background:rgba(16,217,132,0.2);border-radius:2px;}

.company-card{padding:16px;border-radius:12px;border:1px solid transparent;cursor:pointer;transition:all 0.2s;margin-bottom:6px;}
.company-card:hover{background:rgba(16,217,132,0.05);border-color:var(--emerald-border);}
.company-card.active{background:rgba(16,217,132,0.08);border-color:var(--emerald);}
.cc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3;}
.cc-meta{display:flex;gap:8px;flex-wrap:wrap;}
.cc-tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;}
.tag-state{background:rgba(59,130,246,0.12);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);}
.tag-levy{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.2);}
.tag-status-sent{background:rgba(16,217,132,0.1);color:var(--emerald);border:1px solid var(--emerald-border);}
.tag-status-pending{background:rgba(136,153,187,0.08);color:var(--muted);border:1px solid var(--border);}

.list-loading{text-align:center;padding:40px 20px;color:var(--muted);}
.list-spinner{width:28px;height:28px;border:2px solid rgba(16,217,132,0.15);border-top-color:var(--emerald);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}

/* RIGHT PANEL */
.right-panel{overflow-y:auto;padding:32px;}
.right-panel::-webkit-scrollbar{width:3px;}
.right-panel::-webkit-scrollbar-thumb{background:rgba(16,217,132,0.2);}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;text-align:center;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.4;}
.empty-state h3{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
.empty-state p{font-size:15px;max-width:320px;line-height:1.6;}

/* COMPANY DETAIL */
.detail-wrap{animation:fadeUp 0.4s ease both;}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;}
.detail-name{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:8px;}
.detail-id{font-size:12px;color:var(--muted);letter-spacing:1px;}
.detail-actions{display:flex;gap:8px;flex-shrink:0;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.info-card{background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.info-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600;}
.info-value{font-size:15px;font-weight:600;color:var(--text);}
.info-value.emerald{color:var(--emerald);}
.info-value.blue{color:#93c5fd;}

/* EDIT SECTION */
.section-title{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:14px;}

.edit-card{background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.edit-row:last-child{margin-bottom:0;}
.edit-field{display:flex;flex-direction:column;gap:6px;}
.edit-field.full{grid-column:1/-1;}
.edit-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.5px;}
.edit-inp{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:all 0.3s;width:100%;}
.edit-inp:focus{border-color:var(--emerald);background:rgba(0,0,0,0.5);}
.save-row{display:flex;justify-content:flex-end;margin-top:14px;}
.btn-save{background:rgba(16,217,132,0.12);border:1px solid var(--emerald-border);color:var(--emerald);padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.3s;}
.btn-save:hover{background:rgba(16,217,132,0.2);}

/* AI RESEARCH */
.research-card{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:12px;padding:20px;margin-bottom:16px;}
.research-output{font-size:15px;color:#c8d8f0;line-height:1.85;white-space:pre-wrap;margin-top:14px;display:none;}
.research-output.on{display:block;}
.research-loading{display:none;align-items:center;gap:10px;color:var(--blue);font-size:14px;margin-top:14px;}
.research-loading.on{display:flex;}
.mini-spin{width:18px;height:18px;border:2px solid rgba(59,130,246,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}

/* SEND EMAIL */
.send-card{background:rgba(16,217,132,0.05);border:1px solid var(--emerald-border);border-radius:12px;padding:20px;margin-bottom:24px;}
.prog-select{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;}
.prog-opt{background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:10px 18px;border-radius:100px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;transition:all 0.25s;}
.prog-opt:hover{border-color:var(--emerald);color:var(--emerald);}
.prog-opt.active{background:var(--emerald);color:#030a06;border-color:var(--emerald);}
.send-status{font-size:13px;margin-top:12px;padding:10px 14px;border-radius:8px;display:none;}
.send-status.success{background:rgba(16,217,132,0.1);color:var(--emerald);border:1px solid var(--emerald-border);display:block;}
.send-status.error{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2);display:block;}

@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
  .left-panel{border-right:none;border-bottom:1px solid var(--border);max-height:50vh;}
  header{padding:0 16px;}
  .hstatus{display:none;}
  .right-panel{padding:20px;}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="glass login-box">
    <div class="brain"><div class="br"></div><div class="br"></div><div class="br"></div></div>
    <div class="login-eye">SGA Academy · Sales Dashboard</div>
    <h2>Sales <span>Command</span></h2>
    <p>Authorised agents only</p>
    <div class="lerr" id="lerr">Invalid credentials.</div>
    <input type="text" class="inp" id="aname" placeholder="Your name" autocomplete="off"/>
    <input type="password" class="inp" id="apass" placeholder="Access code" style="margin-bottom:20px;"/>
    <button class="btn-g full" onclick="doLogin()">Enter Dashboard →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="hbrand">
      <div class="brain brain-sm"><div class="br"></div><div class="br"></div><div class="br"></div></div>
      <div>
        <div class="hname">SGA <span>Command</span></div>
        <div class="hsub">Sales Dashboard</div>
      </div>
    </div>
    <div class="hstatus"><div class="hdot"></div>Live</div>
    <div class="hright">
      <div class="hagent" id="adisp">—</div>
      <button class="btn-sm" onclick="doLogout()">Exit</button>
    </div>
  </header>

  <div class="layout">
    <!-- LEFT: Company List -->
    <div class="left-panel">
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-inp" id="search" placeholder="Search company name..." oninput="doSearch()"/>
        </div>
        <div class="search-meta">
          <span id="count-txt">Loading companies...</span>
          <span class="search-count" id="count-num"></span>
        </div>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="filterState(this,'')">All States</button>
        <button class="filter-btn" onclick="filterState(this,'Selangor')">Selangor</button>
        <button class="filter-btn" onclick="filterState(this,'Johor')">Johor</button>
        <button class="filter-btn" onclick="filterState(this,'Kuala Lumpur')">KL</button>
        <button class="filter-btn" onclick="filterState(this,'Sabah')">Sabah</button>
        <button class="filter-btn" onclick="filterState(this,'Sarawak')">Sarawak</button>
      </div>
      <div class="company-list" id="company-list">
        <div class="list-loading"><div class="list-spinner"></div>Loading database...</div>
      </div>
    </div>

    <!-- RIGHT: Company Detail -->
    <div class="right-panel" id="right-panel">
      <div class="empty-state">
        <div class="empty-icon">🏢</div>
        <h3>Select a Company</h3>
        <p>Search and click any company from the list to view details, research with AI and send an email.</p>
      </div>
    </div>
  </div>
</div>

<script>
const PASS='SGA2026';
const AT_TOKEN='patSlsucJlRnuYtcc.b69db2da7e15e6625addefa758ba403abd9efa07ac47facd14e053ebe788a735';
const AT_BASE='app6tvBb3pCAbKtlL';
const AT_TABLE='tblaXCqTkfnRg7ttp';
const OAI_KEY='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';

let agent='', allRecords=[], filtered=[], selectedId=null, stateFilter='';

/* ── LOGIN ── */
function doLogin(){
  const n=document.getElementById('aname').value.trim();
  const p=document.getElementById('apass').value;
  const e=document.getElementById('lerr');
  if(!n){e.textContent='Please enter your name.';e.style.display='block';return;}
  if(p!==PASS){e.style.display='block';return;}
  agent=n;
  document.getElementById('adisp').textContent=n;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadCompanies();
}
function doLogout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('apass').value='';
}

/* ── LOAD COMPANIES FROM AIRTABLE ── */
async function loadCompanies(){
  allRecords=[];
  let offset=null;
  try{
    do{
      const url=`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}?pageSize=100${offset?'&offset='+offset:''}`;
      const res=await fetch(url,{headers:{'Authorization':'Bearer '+AT_TOKEN}});
      const d=await res.json();
      if(d.records) allRecords=[...allRecords,...d.records];
      offset=d.offset||null;
    } while(offset && allRecords.length<500); // load up to 500 for speed
    renderList(allRecords);
    document.getElementById('count-txt').textContent='Companies loaded';
    document.getElementById('count-num').textContent=allRecords.length+' shown';
  }catch(e){
    document.getElementById('company-list').innerHTML='<div class="list-loading" style="color:#f87171">Failed to load. Check connection.</div>';
  }
}

/* ── RENDER LIST ── */
function renderList(records){
  filtered=records;
  const list=document.getElementById('company-list');
  if(!records.length){list.innerHTML='<div class="list-loading">No companies found</div>';return;}
  document.getElementById('count-num').textContent=records.length+' shown';
  list.innerHTML=records.slice(0,200).map(r=>{
    const f=r.fields;
    const levy=f['Current Levy Balance (RM)']?'RM '+Number(f['Current Levy Balance (RM)']).toLocaleString():'—';
    const state=f['State']||'—';
    const status=f['Status']==='Sent'?'tag-status-sent':'tag-status-pending';
    const statusTxt=f['Status']||'Pending';
    return `<div class="company-card${selectedId===r.id?' active':''}" onclick="selectCompany('${r.id}')">
      <div class="cc-name">${f['Employer Name']||'Unknown'}</div>
      <div class="cc-meta">
        <span class="cc-tag tag-state">${state}</span>
        <span class="cc-tag tag-levy">${levy}</span>
        <span class="cc-tag ${status}">${statusTxt}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── SEARCH ── */
let searchTimer;
function doSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const q=document.getElementById('search').value.toLowerCase();
    let recs=allRecords;
    if(stateFilter) recs=recs.filter(r=>(r.fields['State']||'').toLowerCase().includes(stateFilter.toLowerCase()));
    if(q) recs=recs.filter(r=>(r.fields['Employer Name']||'').toLowerCase().includes(q));
    renderList(recs);
  },300);
}

function filterState(btn,state){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  stateFilter=state;
  doSearch();
}

/* ── SELECT COMPANY ── */
function selectCompany(id){
  selectedId=id;
  document.querySelectorAll('.company-card').forEach(c=>c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const rec=allRecords.find(r=>r.id===id);
  if(!rec)return;
  renderDetail(rec);
}

/* ── RENDER DETAIL ── */
function renderDetail(rec){
  const f=rec.fields;
  const levy=f['Current Levy Balance (RM)']?'RM '+Number(f['Current Levy Balance (RM)']).toLocaleString():'—';
  document.getElementById('right-panel').innerHTML=`
    <div class="detail-wrap">
      <div class="detail-header">
        <div>
          <div class="detail-name">${f['Employer Name']||'Unknown Company'}</div>
          <div class="detail-id">ID: ${f['MyCoID']||rec.id}</div>
        </div>
        <div class="detail-actions">
          <span class="cc-tag ${f['Status']==='Sent'?'tag-status-sent':'tag-status-pending'}" style="padding:8px 14px;font-size:13px;">${f['Status']||'Pending'}</span>
        </div>
      </div>

      <!-- INFO GRID -->
      <div class="info-grid">
        <div class="info-card"><div class="info-label">State</div><div class="info-value blue">${f['State']||'—'}</div></div>
        <div class="info-card"><div class="info-label">Levy Balance</div><div class="info-value emerald">${levy}</div></div>
        <div class="info-card" style="grid-column:1/-1"><div class="info-label">Business Activities</div><div class="info-value" style="font-weight:400;font-size:14px;color:#c8d8f0">${f['Activities']||'—'}</div></div>
        <div class="info-card"><div class="info-label">Email</div><div class="info-value" style="font-size:13px;font-weight:400">${f['Email']||'—'}</div></div>
        <div class="info-card"><div class="info-label">Program Focus</div><div class="info-value emerald">${f['program focus']||'Not set'}</div></div>
      </div>

      <!-- EDIT SECTION -->
      <div class="section-title" style="margin-bottom:14px;">✏️ Update Company Details</div>
      <div class="edit-card">
        <div class="edit-row">
          <div class="edit-field">
            <label class="edit-label">Employer Name</label>
            <input class="edit-inp" id="edit-name" value="${(f['Employer Name']||'').replace(/"/g,'&quot;')}"/>
          </div>
          <div class="edit-field">
            <label class="edit-label">Email Address</label>
            <input class="edit-inp" id="edit-email" value="${f['Email']||''}"/>
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field">
            <label class="edit-label">State</label>
            <input class="edit-inp" id="edit-state" value="${f['State']||''}"/>
          </div>
          <div class="edit-field">
            <label class="edit-label">Activities</label>
            <input class="edit-inp" id="edit-activities" value="${(f['Activities']||'').replace(/"/g,'&quot;')}"/>
          </div>
        </div>
        <div class="save-row">
          <button class="btn-save" onclick="saveCompany('${rec.id}')">💾 Save Changes</button>
        </div>
        <div id="save-status" style="font-size:13px;margin-top:10px;color:var(--emerald);display:none;">✅ Saved successfully!</div>
      </div>

      <!-- AI RESEARCH -->
      <div class="section-title" style="margin-bottom:14px;">🤖 AI Research Brief</div>
      <div class="research-card">
        <p style="font-size:14px;color:var(--muted);margin-bottom:14px;">Get an instant AI intelligence brief on this company — their business, why they need training and the best sales angle to use.</p>
        <button class="btn-g" onclick="doResearch('${rec.id}')">Generate Research Brief →</button>
        <div class="research-loading" id="research-loading"><div class="mini-spin"></div>Analysing company intelligence...</div>
        <div class="research-output" id="research-output"></div>
      </div>

      <!-- SEND EMAIL -->
      <div class="section-title" style="margin-bottom:14px;">📧 Send Outreach Email</div>
      <div class="send-card">
        <p style="font-size:14px;color:var(--muted);margin-bottom:4px;">Select the programme that fits this company then send. The AI will write and send the email automatically.</p>
        <div class="prog-select">
          <button class="prog-opt" onclick="selectProg(this,'EV')">⚡ EV / Autotronics</button>
          <button class="prog-opt" onclick="selectProg(this,'Drone')">🚁 Drone / CEA</button>
          <button class="prog-opt" onclick="selectProg(this,'Automation')">🏭 Automation</button>
        </div>
        <button class="btn-g" onclick="sendEmail('${rec.id}')">Send Email →</button>
        <div class="send-status" id="send-status"></div>
      </div>

    </div>`;
}

/* ── SAVE COMPANY ── */
async function saveCompany(id){
  const fields={
    'Employer Name':document.getElementById('edit-name').value,
    'Email':document.getElementById('edit-email').value,
    'State':document.getElementById('edit-state').value,
    'Activities':document.getElementById('edit-activities').value
  };
  try{
    const res=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}/${id}`,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({fields})
    });
    if(res.ok){
      // Update local record
      const rec=allRecords.find(r=>r.id===id);
      if(rec) Object.assign(rec.fields,fields);
      document.getElementById('save-status').style.display='block';
      setTimeout(()=>{const s=document.getElementById('save-status');if(s)s.style.display='none';},3000);
    }
  }catch(e){console.error(e);}
}

/* ── AI RESEARCH ── */
async function doResearch(id){
  const rec=allRecords.find(r=>r.id===id);if(!rec)return;
  const f=rec.fields;
  const loading=document.getElementById('research-loading');
  const output=document.getElementById('research-output');
  loading.classList.add('on');output.classList.remove('on');
  try{
    const res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+OAI_KEY},
      body:JSON.stringify({
        model:'gpt-4o',max_tokens:600,
        messages:[
          {role:'system',content:`You are a B2B sales intelligence analyst for SG Academy Malaysia. Analyse companies and give sales agents a concise intelligence brief to help them pitch training programmes (EV, Drone, Industrial Automation).

Format your response as:
🏢 COMPANY OVERVIEW
[2 sentences about what this company does]

🎯 SALES OPPORTUNITY
[Why they would benefit from training — link their industry to EV, Drone or Automation]

💡 RECOMMENDED PROGRAMME
[Which programme fits best and why]

📌 TALKING POINTS
[3 bullet points the salesperson can use in their pitch]`},
          {role:'user',content:`Company: ${f['Employer Name']}\nState: ${f['State']}\nActivities: ${f['Activities']}\nLevy Balance: RM ${f['Current Levy Balance (RM)']}`}
        ]
      })
    });
    const d=await res.json();
    output.textContent=d.choices[0].message.content;
    loading.classList.remove('on');output.classList.add('on');
  }catch(e){
    loading.classList.remove('on');
    output.textContent='Research failed. Please check your connection.';
    output.classList.add('on');
  }
}

/* ── PROGRAMME SELECT ── */
let selectedProg='';
function selectProg(btn,prog){
  document.querySelectorAll('.prog-opt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');selectedProg=prog;
}

/* ── SEND EMAIL (writes to Airtable → triggers Make.com) ── */
async function sendEmail(id){
  if(!selectedProg){
    const s=document.getElementById('send-status');
    s.textContent='⚠️ Please select a programme first.';
    s.className='send-status error';return;
  }
  const rec=allRecords.find(r=>r.id===id);if(!rec)return;
  try{
    const res=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}/${id}`,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{'program focus':selectedProg,'To Send':true}})
    });
    const respText=await res.text();
    const s=document.getElementById('send-status');
    if(res.ok){
      s.innerHTML='⏳ Email queued — automation is processing, please wait...';
      s.className='send-status success';
      s.style.background='rgba(251,191,36,0.08)';
      s.style.borderColor='rgba(251,191,36,0.3)';
      s.style.color='#fbbf24';
      s.style.display='block';
      const r=allRecords.find(x=>x.id===id);
      if(r) r.fields['program focus']=selectedProg;
      renderList(filtered);
      // Start polling for delivery confirmation
      pollForDelivery(id);
    }else{
      s.textContent='❌ Airtable error '+res.status+': '+respText;
      s.className='send-status error';
    }
  }catch(e){
    const s=document.getElementById('send-status');
    s.textContent='❌ '+e.message;
    s.className='send-status error';
  }
}

/* ── POLL AIRTABLE FOR STATUS UPDATE ── */
async function pollForDelivery(id, attempts=0){
  if(attempts>20) return; // stop after ~2 minutes
  try{
    const res=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}/${id}`,{
      headers:{'Authorization':'Bearer '+AT_TOKEN}
    });
    const d=await res.json();
    const status=d.fields['Status'];
    const s=document.getElementById('send-status');
    if(!s) return;
    if(status==='Sent'){
      const name=d.fields['Employer Name']||'company';
      s.textContent='✅ Email successfully delivered to '+name+'!';
      s.className='send-status success';
      // Update card in list
      const rec=allRecords.find(r=>r.id===id);
      if(rec) rec.fields['Status']='Sent';
      renderList(filtered);
    } else {
      // Keep polling every 6 seconds
      setTimeout(()=>pollForDelivery(id, attempts+1), 6000);
    }
  }catch(e){
    setTimeout(()=>pollForDelivery(id, attempts+1), 6000);
  }
}

document.addEventListener('keypress',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();
});
